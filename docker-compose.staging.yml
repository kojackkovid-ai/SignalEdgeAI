version: '3.8'

services:
  postgres-staging:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: stagingpass123
      POSTGRES_DB: sports_predictions_staging
    ports:
      - "5433:5432"
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-staging:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-staging:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:stagingpass123@postgres-staging:5432/sports_predictions_staging
      REDIS_URL: redis://redis-staging:6379
      SECRET_KEY: staging-secret-key-do-not-use-in-prod
      API_HOST: 0.0.0.0
      API_PORT: 8000
      LOG_LEVEL: INFO
      ENVIRONMENT: staging
      SLOT_BASED_RECOMMENDATIONS: "true"
      ENABLE_ANALYTICS: "true"
    ports:
      - "8001:8000"
    depends_on:
      postgres-staging:
        condition: service_healthy
      redis-staging:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./ml-models:/app/ml-models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      sh -c "
        echo 'Running database migrations...' &&
        python -m alembic upgrade head &&
        echo 'Starting uvicorn server...' &&
        python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  nginx-staging:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-staging.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - backend-staging
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_staging_data:

networks:
  default:
    name: staging-network
