# Nginx Configuration with Let's Encrypt SSL
# Let's Encrypt Configuration for signaledge.rshare.io
# This config handles:
# - HTTP to HTTPS redirect
# - Let's Encrypt validation (/.well-known/acme-challenge/)
# - API proxying to backend
# - Frontend serving
# - Security headers

# ============================================================
# HTTP Server Block - Redirect to HTTPS + Let's Encrypt validation
# ============================================================
server {
    listen 80;
    server_name signaledge.rshare.io;

    # Let's Encrypt validation endpoint
    # Required for certificate generation and renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# ============================================================
# HTTPS Server Block - Secure connections with Let's Encrypt
# ============================================================
server {
    listen 443 ssl http2;
    http2_push_preload on;
    server_name signaledge.rshare.io;

    # ========== SSL/TLS Configuration ==========
    # Let's Encrypt certificates (auto-renewed by Certbot)
    ssl_certificate /etc/letsencrypt/live/signaledge.rshare.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/signaledge.rshare.io/privkey.pem;

    # SSL Protocol and Cipher Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # OCSP Stapling - Improves SSL verification performance
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ========== Security Headers ==========
    # Force HTTPS for 1 year (HSTS)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Prevent MIME-type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Clickjacking prevention
    add_header X-Frame-Options "DENY" always;

    # XSS Protection (legacy, but recommended)
    add_header X-XSS-Protection "1; mode=block" always;

    # Referrer Policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Content Security Policy
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'none';" always;

    # Permissions Policy (modern)
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;

    # Expect-CT
    add_header Expect-CT "max-age=86400; enforce" always;

    # ========== Frontend Static Assets ==========
    location / {
        root /app;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;

        # Cache static assets for 1 hour
        expires 1h;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
    }

    # Cache busting for JS/CSS with version hashes
    location ~* \.(js|css)$ {
        root /app;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Cache images for 1 year
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp)$ {
        root /app;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ========== API Backend Proxy ==========
    location /api/ {
        proxy_pass http://backend:8000;

        # Pass original request info to backend
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header X-Forwarded-Port 443;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts (adjust based on your needs)
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # ========== Health Check Endpoint ==========
    location /health {
        proxy_pass http://backend:8000/health;
        access_log off;
    }

    # ========== Deny Access to Sensitive Files ==========
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ========== Logging ==========
    access_log /var/log/nginx/access.log combined buffer=32k flush=5s;
    error_log /var/log/nginx/error.log warn;
}
