# Define upstream to backend service at root level
upstream backend_api {
    server backend:8000;
}

server {
    listen 3000;
    server_name _;

    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }

    # Proxy all /api/* requests to backend
    # In Docker: backend service runs on port 8000
    # In local dev: backend runs on port 8001 (handled by vite.config.ts dev proxy)
    location /api {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host localhost;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_pass_request_headers on;
        
        # Disable request/response buffering
        proxy_request_buffering off;
        proxy_buffering off;
        
        # Increase timeouts to handle slow backend requests
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        keepalive_timeout 300s;
    }
}
