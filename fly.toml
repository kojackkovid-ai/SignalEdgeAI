# Fly.io Configuration for Sports Prediction Platform
app = "sports-predictions-ai"
primary_region = "ord"

[build]
  builder = "docker"
  dockerfile = "./Dockerfile.fly"

[env]
  PYTHONUNBUFFERED = "1"
  ENVIRONMENT = "production"
  API_HOST = "0.0.0.0"
  API_PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true

[[services]]
  protocol = "tcp"
  internal_port = 8080
  ports = [{ handlers = ["http"], port = "80" }, { handlers = ["tls", "http"], port = "443" }]

  [services.concurrency]
    type = "connections"
    hard_limit = 1000
    soft_limit = 800

[checks]
  [checks.alive]
    type = "http"
    interval = "30s"
    timeout = "5s"
    grace_period = "15s"
    method = "GET"
    path = "/health"

[[vm]]
  memory = "512mb"
  cpus = 1

[mounts]
  source = "ml_models"
  destination = "/app/ml-models"
  initial_size = "5gb"

# Database connections via Fly Postgres
# Add PostgreSQL: flyctl postgres create
# Add Redis: flyctl redis create
