# fly.toml app configuration file generated for signaledge-ai on 2026-04-19T18:00:18Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'signaledge-ai'
primary_region = 'ams'

[build]
  context = '.'
  dockerfile = 'backend/Dockerfile'
  
  [build.args]
    PYTHON_VERSION = '3.12.10'

[env]
  # Required production env vars must be set via Fly secrets or environment.
  # Example:
  #   flyctl secrets set ODDS_API_KEY=your_odds_api_key STRIPE_SECRET_KEY=sk_live_xxx STRIPE_WEBHOOK_SECRET=whsec_xxx
  # If using attached Fly Postgres, FLY_DATABASE_URL is provided automatically.
  ENVIRONMENT = 'production'
  API_HOST = '0.0.0.0'
  API_PORT = '8000'
  PYTHONUNBUFFERED = 'true'
  USE_SQLITE = 'false'
  PORT = '8000'
  ALLOWED_HOSTS = 'signaledge-ai.fly.dev,*.fly.dev,localhost,127.0.0.1'
  CORS_ORIGINS = 'https://signaledge-ai.fly.dev'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
