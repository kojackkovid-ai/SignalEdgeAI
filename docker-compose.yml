version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: signaledge-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: sports_predictions_password
      POSTGRES_DB: sports_predictions
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: signaledge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app-network

  # Backend API
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: signaledge-api
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:sports_predictions_password@postgres:5432/sports_predictions
      REDIS_URL: redis://redis:6379
      SECRET_KEY: development-secret-key-do-not-use-in-production
      API_HOST: 0.0.0.0
      API_PORT: 8000
      LOG_LEVEL: DEBUG
      ENVIRONMENT: development
      SLOT_BASED_RECOMMENDATIONS: "true"
      ENABLE_ANALYTICS: "true"
      PYTHONPATH: /app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./ml-models:/app/ml-models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app-network
    command: >
      sh -c "
        python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000/api
        VITE_APP_NAME: SignalEdge AI
        VITE_STRIPE_PUBLISHABLE_KEY: ${VITE_STRIPE_PUBLISHABLE_KEY:-}
    container_name: signaledge-web
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-network
    expose:
      - "3000"

  # Nginx Reverse Proxy - Local Development (HTTP only)
  nginx:
    image: nginx:1.24.0-alpine
    container_name: signaledge-nginx
    ports:
      - "80:80"
    volumes:
      # Use simple HTTP configuration for local development
      - ./nginx-dev.conf:/etc/nginx/conf.d/default.conf
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: "sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"

  # Certbot for Let's Encrypt SSL Certificate Management - Disabled for local HTTP development
  # certbot:
  #   image: certbot/certbot:latest
  #   container_name: signaledge-certbot
  #   volumes:
  #     - ./certbot/conf:/etc/letsencrypt
  #     - ./certbot/www:/var/www/certbot
  #   entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet --agree-tos; sleep 12h & wait $${!}; done;"
  #   depends_on:
  #     - nginx
  #   restart: unless-stopped
  #   networks:
  #     - app-network

  # ML Training Worker
  ml-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: signaledge-ml-worker
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:sports_predictions_password@postgres:5432/sports_predictions
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: DEBUG
      PYTHONPATH: /app
    volumes:
      - ./backend:/app/backend
      - ./ml-models:/app/ml-models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network
    command: python /app/backend/app/services/ml_training_scheduler.py

volumes:
  postgres_data:
  redis_data:
  nginx_logs:

networks:
  app-network:
    driver: bridge

